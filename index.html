<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 貓咪照顧排班系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;--green-mid:#9FE1CB;
  --amber:#FAC775;--amber-dark:#633806;
  --blue:#B5D4F4;--blue-dark:#042C53;
  --pink:#F4C0D1;--pink-dark:#4B1528;
  --purple:#EEEDFE;--purple-dark:#26215C;
  --bg:#F8FAF9;--surface:#fff;--border:#E2EAE7;
  --text:#1a2e28;--muted:#6B8C82;--hint:#A8C4BB;
  --red-bg:#FCEBEB;--red-text:#501313;
  --warn-bg:#FAEEDA;--warn-text:#633806;
  --success-bg:#E1F5EE;--success-text:#085041;
  --radius:10px;--radius-sm:6px;
  font-family:'Noto Sans TC',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;}

/* ── 同步列 ── */
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:16px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--hint);flex-shrink:0;transition:background 0.3s;}
.sync-dot.ok{background:var(--green);}
.sync-dot.syncing{background:var(--amber);animation:blink 0.9s infinite;}
.sync-dot.err{background:#E24B4A;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.25;}}
.sync-bar button{margin-left:auto;background:none;border:none;font-size:12px;color:var(--green);cursor:pointer;padding:0;font-family:'Noto Sans TC',sans-serif;}
.sync-bar button:hover{text-decoration:underline;}

/* ── 主體 ── */
.container{max-width:900px;margin:0 auto;padding:24px 16px;}
.header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.header-icon{width:46px;height:46px;background:var(--green-light);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.header h1{font-size:20px;font-weight:600;}
.header p{font-size:13px;color:var(--muted);margin-top:2px;}
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;overflow-x:auto;}
.tab-btn{background:none;border:none;padding:8px 14px;font-size:13px;color:var(--muted);cursor:pointer;border-radius:var(--radius-sm);white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;flex-shrink:0;}
.tab-btn.active{background:var(--green-light);color:var(--green-dark);font-weight:500;}
.tab-btn:hover:not(.active){background:var(--bg);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.section-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.month-nav button{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;font-size:14px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;}
.month-nav button:hover{background:var(--bg);}
.month-title{font-size:15px;font-weight:600;min-width:90px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-header{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;font-weight:500;}
.cal-day{border:1px solid var(--border);border-radius:var(--radius-sm);min-height:80px;padding:5px;cursor:pointer;background:var(--surface);transition:border-color 0.15s;}
.cal-day:hover{border-color:var(--green);}
.cal-day.inactive{background:var(--bg);opacity:0.4;cursor:default;}
.cal-day.inactive:hover{border-color:var(--border);}
.cal-day.has-extra{border-color:var(--green-mid);}
.day-num{font-size:12px;font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:3px;}
.ind-log{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;}
.ind-drug{width:6px;height:6px;border-radius:50%;background:#7F77DD;display:inline-block;}
.shift-pill{font-size:10px;border-radius:3px;padding:1px 4px;margin-bottom:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-early{background:var(--amber);color:var(--amber-dark);}
.sp-noon{background:var(--blue);color:var(--blue-dark);}
.sp-late{background:var(--pink);color:var(--pink-dark);}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:600;}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-row select,.filter-row input[type=date]{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:'Noto Sans TC',sans-serif;outline:none;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{font-size:11px;font-weight:500;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg);}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--bg);}
.shift-badge,.status-badge{display:inline-block;font-size:11px;border-radius:4px;padding:2px 7px;}
.sb-pending{background:var(--warn-bg);color:var(--warn-text);}
.sb-signed{background:var(--success-bg);color:var(--success-text);}
.sb-given{background:var(--success-bg);color:var(--success-text);}
.sb-miss{background:var(--red-bg);color:var(--red-text);}
.drug-badge{display:inline-block;font-size:11px;border-radius:4px;padding:2px 7px;background:var(--purple);color:var(--purple-dark);}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.btn-primary:hover{background:#c5ede0;}
.btn-danger{background:var(--red-bg);border-color:#F09595;color:var(--red-text);}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--hint);font-size:14px;padding:2px 4px;}
.btn-icon:hover{color:var(--red-text);}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;}
.note-meta{font-size:11px;color:var(--hint);margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.note-type-badge{font-size:11px;border-radius:4px;padding:1px 7px;}
.nt-handover{background:var(--warn-bg);color:var(--amber-dark);}
.nt-note{background:var(--success-bg);color:var(--green-dark);}
.nt-alert{background:var(--red-bg);color:var(--red-text);}
.note-text{font-size:13px;line-height:1.6;}
.food-bar{height:6px;border-radius:3px;background:var(--green-light);overflow:hidden;}
.food-fill{height:6px;border-radius:3px;background:var(--green);}
.list-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.list-item:last-child{border-bottom:none;}
.members-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.member-tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 8px;font-size:13px;}
.mdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.add-row{display:flex;gap:8px;}
.add-row input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:'Noto Sans TC',sans-serif;outline:none;}
.add-row input:focus{border-color:var(--green);}
.empty{text-align:center;padding:32px;color:var(--hint);font-size:13px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;width:420px;max-width:100%;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:600;}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;}
.mtab{background:none;border:none;padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans TC',sans-serif;}
.mtab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.form-row select,.form-row input[type=text],.form-row input[type=date],.form-row textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:'Noto Sans TC',sans-serif;outline:none;}
.form-row select:focus,.form-row input:focus,.form-row textarea:focus{border-color:var(--green);}
.form-row textarea{resize:vertical;min-height:70px;line-height:1.6;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.rating-row{display:flex;gap:6px;}
.rating-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);font-family:'Noto Sans TC',sans-serif;transition:all 0.1s;}
.rating-btn.sel{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.log-mini{font-size:12px;display:flex;gap:10px;flex-wrap:wrap;margin:5px 0;color:var(--muted);}
.log-mini strong{color:var(--text);}
.photo-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:border-color 0.15s;margin-top:4px;}
.photo-upload-area:hover{border-color:var(--green);}
.photo-upload-area input[type=file]{display:none;}
.photo-upload-label{font-size:13px;color:var(--muted);cursor:pointer;display:block;}
.photo-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.photo-thumb-wrap{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
.photo-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;cursor:pointer;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;}
.log-photos{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:8px;}
.log-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;transition:opacity 0.15s;}
.log-photos img:hover{opacity:0.82;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:var(--radius);object-fit:contain;}
.lightbox-close{position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;}
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .cal-day{min-height:52px;padding:3px;}
  .shift-pill{font-size:0;height:6px;padding:0;margin-bottom:2px;border-radius:3px;overflow:hidden;}
  .container{padding:14px 8px;}
  table{font-size:12px;}
  th,td{padding:6px 5px;}
  .tabs{gap:1px;}
  .tab-btn{padding:7px 9px;font-size:12px;}
  .day-num{font-size:11px;}
}
</style>
</head>
<body>

<!-- 主畫面 -->
<div class="container" id="main-app">
  <div class="header">
    <div class="header-icon">🐱</div>
    <div>
      <h1>貓咪照顧排班系統</h1>
      <p>2026年5月29日 — 6月20日</p>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-msg">連線中…</span>
    <button onclick="loadFromSheet()">↻ 重新整理</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('schedule')">📅 排班日曆</button>
    <button class="tab-btn" onclick="switchTab('signin')">✅ 簽到紀錄</button>
    <button class="tab-btn" onclick="switchTab('logs')">📋 每日日誌</button>
    <button class="tab-btn" onclick="switchTab('drugs')">💊 藥物記錄</button>
    <button class="tab-btn" onclick="switchTab('notes')">💬 交接備註</button>
    <button class="tab-btn" onclick="switchTab('members')">👥 人員</button>
  </div>

  <!-- 排班日曆 -->
  <div id="tab-schedule" class="tab-content active">
    <div class="card">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber);"></div>早班 07–12</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue);"></div>午班 12–18</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--pink);"></div>晚班 18–22</div>
        <div class="legend-item"><span class="ind-log"></span>有日誌</div>
        <div class="legend-item"><span class="ind-drug"></span>有藥物</div>
      </div>
      <div class="month-nav">
        <button onclick="prevMonth()">&#8249;</button>
        <span class="month-title" id="month-title"></span>
        <button onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-headers"></div>
      <div style="height:5px;"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- 簽到紀錄 -->
  <div id="tab-signin" class="tab-content">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <div class="filter-row">
        <select id="f-member" onchange="renderSignin()"><option value="">全部人員</option></select>
        <select id="f-status" onchange="renderSignin()"><option value="">全部狀態</option><option value="signed">已簽到</option><option value="pending">未簽到</option></select>
        <select id="f-shift" onchange="renderSignin()"><option value="">全部班別</option><option value="early">早班</option><option value="noon">午班</option><option value="late">晚班</option></select>
      </div>
      <table><thead><tr><th>日期</th><th>班別</th><th>人員</th><th>簽到時間</th><th>狀態</th><th></th></tr></thead>
      <tbody id="signin-body"></tbody></table>
    </div>
  </div>

  <!-- 每日日誌 -->
  <div id="tab-logs" class="tab-content">
    <div class="filter-row">
      <input type="date" id="log-fd" onchange="renderLogs()">
      <select id="log-fm" onchange="renderLogs()"><option value="">全部人員</option></select>
    </div>
    <div id="logs-list"></div>
    <div style="margin-top:10px;"><button class="btn btn-primary" onclick="openLogModal('')">+ 新增日誌</button></div>
  </div>

  <!-- 藥物記錄 -->
  <div id="tab-drugs" class="tab-content">
    <div class="card">
      <div class="section-label">藥物清單</div>
      <div id="drug-items"></div>
      <div style="margin-top:10px;"><button class="btn btn-primary btn-sm" onclick="openDrugItemModal()">+ 新增藥物</button></div>
    </div>
    <div class="card">
      <div class="section-label">給藥紀錄</div>
      <div class="filter-row">
        <input type="date" id="drug-fd" onchange="renderDrugRecords()">
        <select id="drug-fn" onchange="renderDrugRecords()"><option value="">全部藥物</option></select>
      </div>
      <table><thead><tr><th>日期</th><th>藥物</th><th>劑量</th><th>給藥人</th><th>時間</th><th>狀態</th><th></th></tr></thead>
      <tbody id="drug-body"></tbody></table>
      <div style="margin-top:10px;"><button class="btn btn-primary btn-sm" onclick="openDrugRecordModal('')">+ 記錄給藥</button></div>
    </div>
  </div>

  <!-- 交接備註 -->
  <div id="tab-notes" class="tab-content">
    <div class="filter-row">
      <select id="note-ft" onchange="renderNotes()"><option value="">全部類型</option><option value="handover">交接事項</option><option value="note">一般備註</option><option value="alert">注意事項</option></select>
    </div>
    <div id="notes-list"></div>
    <div style="margin-top:10px;"><button class="btn btn-primary" onclick="openNoteModal()">+ 新增備註</button></div>
  </div>

  <!-- 人員 -->
  <div id="tab-members" class="tab-content">
    <div class="card">
      <div class="section-label">目前人員</div>
      <div class="members-row" id="members-row"></div>
      <div class="add-row">
        <input type="text" id="new-member" placeholder="輸入姓名" onkeydown="if(event.key==='Enter')addMember()">
        <button class="btn btn-primary" onclick="addMember()">+ 新增</button>
      </div>
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:10px;">排班統計</div>
      <table><thead><tr><th>人員</th><th>總班</th><th>早班</th><th>午班</th><th>晚班</th><th>總時數</th><th>已簽到</th><th>日誌</th></tr></thead>
      <tbody id="member-stats"></tbody></table>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="btn-icon" onclick="closeModal()" style="font-size:18px;">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════════
//  ★ 設定區（可自行修改）
// ════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw8w_gudjINkNktkWmqdTn4gOB15C0q8VzfNX9SQn5lErVAdFPohsVh3iuCp4HXmuQq7g/exec';

// ════════════════════════════════
//  常數
// ════════════════════════════════
const COLORS=['#1D9E75','#378ADD','#D85A30','#D4537E','#BA7517','#7F77DD','#639922','#E24B4A','#884400','#5F5E5A'];
const DAYS=['日','一','二','三','四','五','六'];
const SHIFTS={early:{label:'早班',time:'07:00–12:00',cls:'sp-early'},noon:{label:'午班',time:'12:00–18:00',cls:'sp-noon'},late:{label:'晚班',time:'18:00–22:00',cls:'sp-late'}};
const START=new Date(2026,4,29), END=new Date(2026,5,20);
const WL=['未觀察','少','正常','多'], TL=['未觀察','異常','正常'], ML=['未觀察','差','普通','好'];
const TYPE_INFO={handover:{cls:'nt-handover',label:'交接事項'},note:{cls:'nt-note',label:'一般備註'},alert:{cls:'nt-alert',label:'注意事項'}};

// ════════════════════════════════
//  狀態
// ════════════════════════════════
let members=['小明','小美','阿志','淑芬'];
let schedules={}, logs={}, drugItems=[], drugRecords=[], notesData=[];
let curMonth=4, curYear=2026;
let pendingPhotos=[];
let saveTimer=null;


// ════════════════════════════════
//  Google Sheets 同步
// ════════════════════════════════
function setSyncState(state, msg){
  document.getElementById('sync-dot').className='sync-dot '+state;
  document.getElementById('sync-msg').textContent=msg;
}

async function loadFromSheet(){
  setSyncState('syncing','載入資料中…');
  try{
    const res=await fetch(GAS_URL+'?t='+Date.now());
    const json=await res.json();
    if(json.ok && json.data){
      const d=json.data;
      if(d.members)     members    =JSON.parse(d.members);
      if(d.schedules)   schedules  =JSON.parse(d.schedules);
      if(d.logs)        logs       =JSON.parse(d.logs);
      if(d.drugItems)   drugItems  =JSON.parse(d.drugItems);
      if(d.drugRecords) drugRecords=JSON.parse(d.drugRecords);
      if(d.notesData)   notesData  =JSON.parse(d.notesData);
      // 照片獨立存放，從本機 localStorage 讀取（不存進 Sheets）
      try{
        const localPhotos=JSON.parse(localStorage.getItem('catcare_photos')||'{}');
        // 將本機照片合併回 logs
        for(const[date,list]of Object.entries(logs)){
          list.forEach((l,i)=>{
            const pkey=`${date}_${i}`;
            if(localPhotos[pkey]) l.photos=localPhotos[pkey];
            else if(!l.photos) l.photos=[];
          });
        }
      }catch(e){}
      // 備份到本機（不含照片，避免超出容量）
      try{
        const bak={members:d.members,schedules:d.schedules,logs:d.logs,drugItems:d.drugItems,drugRecords:d.drugRecords,notesData:d.notesData};
        localStorage.setItem('catcare_bak',JSON.stringify(bak));
      }catch(e){}
    }
    setSyncState('ok','已同步 · '+nowHM());
    renderCalendar();
  } catch(e){
    setSyncState('err','無法連線，使用本機備份');
    loadLocal();
    renderCalendar();
  }
}

async function pushKey(key, value){
  try{
    // 更新本機備份
    const bak=JSON.parse(localStorage.getItem('catcare_bak')||'{}');
    bak[key]=value;
    localStorage.setItem('catcare_bak', JSON.stringify(bak));
  }catch(e){}
  setSyncState('syncing','儲存中…');
  try{
    await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action:'save', key, value})});
    setSyncState('ok','已同步 · '+nowHM());
  } catch(e){
    setSyncState('err','儲存失敗，僅存本機');
  }
}

function loadLocal(){
  try{
    const d=JSON.parse(localStorage.getItem('catcare_bak')||'{}');
    if(d.members)     members    =JSON.parse(d.members);
    if(d.schedules)   schedules  =JSON.parse(d.schedules);
    if(d.logs)        logs       =JSON.parse(d.logs);
    if(d.drugItems)   drugItems  =JSON.parse(d.drugItems);
    if(d.drugRecords) drugRecords=JSON.parse(d.drugRecords);
    if(d.notesData)   notesData  =JSON.parse(d.notesData);
  }catch(e){}
}

// 防抖：資料變更後 800ms 統一送出
function save(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    // 照片從 logs 抽出來，只存本機 localStorage
    const logsNoPhotos={};
    const photoStore={};
    for(const[date,list]of Object.entries(logs)){
      logsNoPhotos[date]=list.map((l,i)=>{
        if(l.photos&&l.photos.length){
          photoStore[`${date}_${i}`]=l.photos;
        }
        const{photos,...rest}=l;
        return rest;
      });
    }
    try{ localStorage.setItem('catcare_photos',JSON.stringify(photoStore)); }catch(e){}
    // 其餘資料同步到 Sheets
    pushKey('members',     JSON.stringify(members));
    pushKey('schedules',   JSON.stringify(schedules));
    pushKey('logs',        JSON.stringify(logsNoPhotos));
    pushKey('drugItems',   JSON.stringify(drugItems));
    pushKey('drugRecords', JSON.stringify(drugRecords));
    pushKey('notesData',   JSON.stringify(notesData));
  }, 800);
}

function mc(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h];}
function inRange(y,m,d){const dt=new Date(y,m,d);return dt>=START&&dt<=END;}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function nowStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function nowHM(){return nowStr();}
function todayDk(){const n=new Date();return dk(n.getFullYear(),n.getMonth(),n.getDate());}

function renderCalendar(){
  document.getElementById('cal-headers').innerHTML=DAYS.map(d=>`<div class="cal-header">${d}</div>`).join('');
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  document.getElementById('month-title').textContent=`${curYear}年${curMonth+1}月`;
  const first=new Date(curYear,curMonth,1).getDay();
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day inactive';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const key=dk(curYear,curMonth,d);
    const inR=inRange(curYear,curMonth,d);
    const el=document.createElement('div');
    el.className='cal-day'+(inR?'':' inactive');
    const hasLog=(logs[key]||[]).length>0;
    const hasDrug=drugRecords.filter(r=>r.date===key).length>0;
    if(inR&&(hasLog||hasDrug))el.classList.add('has-extra');
    let h=`<div class="day-num">${d}`;
    if(hasLog)h+=` <span class="ind-log"></span>`;
    if(hasDrug)h+=` <span class="ind-drug"></span>`;
    h+='</div>';
    (schedules[key]||[]).forEach(s=>{h+=`<span class="shift-pill ${SHIFTS[s.shift].cls}">${(s.member||'').slice(0,2)} ${SHIFTS[s.shift].label}</span>`;});
    el.innerHTML=h;
    if(inR)el.onclick=()=>openDayModal(curYear,curMonth,d);
    grid.appendChild(el);
  }
}
function prevMonth(){if(curMonth===4&&curYear===2026)return;curMonth===0?(curMonth=11,curYear--):curMonth--;renderCalendar();}
function nextMonth(){if(curMonth===5&&curYear===2026)return;curMonth===11?(curMonth=0,curYear++):curMonth++;renderCalendar();}

function addSched(key){
  if(!schedules[key])schedules[key]=[];
  schedules[key].push({shift:document.getElementById('ns').value,member:document.getElementById('np').value,signed:false,signTime:null});
  save();renderCalendar();
}
function delSched(key,idx){
  schedules[key].splice(idx,1);
  // 若該日排班清空則刪除 key，避免留下空陣列被重複計算
  if(schedules[key].length===0) delete schedules[key];
  save();renderCalendar();
}
function getAllScheds(){
  const all=[];
  for(const[key,list]of Object.entries(schedules)){
    // 只處理非空陣列
    if(!Array.isArray(list)||list.length===0) continue;
    list.forEach((s,i)=>all.push({key,idx:i,...s}));
  }
  return all.sort((a,b)=>a.key.localeCompare(b.key));
}

function handlePhotoUpload(e){
  const files=Array.from(e.target.files);
  const rem=5-pendingPhotos.length;
  if(rem<=0){alert('最多 5 張照片');return;}
  files.slice(0,rem).forEach(file=>{
    const r=new FileReader();
    r.onload=ev=>{
      // 壓縮圖片至最長邊 800px，降低儲存大小
      const img=new Image();
      img.onload=()=>{
        const MAX=800;
        let w=img.width, h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX;}
          else{w=Math.round(w*MAX/h);h=MAX;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        pendingPhotos.push(canvas.toDataURL('image/jpeg',0.7));
        renderPhotoPreview();
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

  const g=document.getElementById('photo-preview');

        <span>精神 <strong>${ML[l.mood]||'—'}</strong></span>
      </div>
      <div class="food-bar" style="max-width:120px;margin:5px 0;"><div class="food-fill" style="width:${l.food*20}%;"></div></div>
      ${l.memo?`<div class="note-text">${l.memo}</div>`:''}
      ${photos}
      <div style="text-align:right;margin-top:6px;">
        <button class="btn btn-danger btn-sm" onclick="delLog('${l.key}',${l.idx})">刪除</button>
      </div>
    </div>`;
  }).join('');
}
function openLightbox(key,idx,pi){
  document.getElementById('lightbox-img').src=logs[key][idx].photos[pi];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ════════════════════════════════
//  藥物
// ════════════════════════════════
function openDrugItemModal(){
  document.getElementById('modal-title').textContent='新增藥物';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-row"><label>藥物名稱</label><input type="text" id="din" placeholder="例：耳藥、益生菌"></div>
    <div class="form-row"><label>劑量說明</label><input type="text" id="did" placeholder="例：2滴、1顆"></div>
    <div class="form-row"><label>頻率</label><select id="dif"><option>每日一次</option><option>每日兩次</option><option>每日三次</option><option>隔日</option><option>需要時</option></select></div>
    <div class="form-row"><label>注意事項</label><input type="text" id="din2" placeholder="給藥注意事項（選填）"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveDrugItem()">新增</button>
    </div>`;
  openModal();
}
function saveDrugItem(){
  const name=document.getElementById('din').value.trim();
  if(!name)return;
  drugItems.push({name,dose:document.getElementById('did').value.trim(),freq:document.getElementById('dif').value,note:document.getElementById('din2').value.trim()});
  save();closeModal();renderDrugItems();renderDrugRecords();
}
function renderDrugItems(){
  const el=document.getElementById('drug-items');
  if(!drugItems.length){el.innerHTML='<p style="font-size:13px;color:var(--muted);">尚無藥物，請先新增</p>';return;}
  el.innerHTML=drugItems.map((d,i)=>`
    <div class="list-item">
      <span class="drug-badge">${d.name}</span>
      <span style="flex:1;font-size:12px;color:var(--muted);">${d.dose||'—'} · ${d.freq}${d.note?' · '+d.note:''}</span>
      <button class="btn-icon" onclick="drugItems.splice(${i},1);save();renderDrugItems();renderDrugRecords()">🗑</button>
    </div>`).join('');
  syncDrugSelect();
}
function syncDrugSelect(){
  const sel=document.getElementById('drug-fn');
  if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">全部藥物</option>'+drugItems.map(d=>`<option value="${d.name}">${d.name}</option>`).join('');
  sel.value=cur;
}
function openDrugRecordModal(dateVal){
  if(!drugItems.length){alert('請先新增藥物');return;}
  if(!dateVal)dateVal=todayDk();
  document.getElementById('modal-title').textContent='記錄給藥';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-row"><label>日期</label><input type="date" id="drd" value="${dateVal}"></div>
    <div class="form-row"><label>藥物</label><select id="drn">${drugItems.map(d=>`<option value="${d.name}">${d.name}（${d.dose}）</option>`).join('')}</select></div>
    <div class="form-row"><label>實際劑量</label><input type="text" id="drdose" placeholder="實際給予的劑量"></div>
    <div class="form-row"><label>給藥人員</label><select id="drg">${members.map(m=>`<option>${m}</option>`).join('')}</select></div>
    <div class="form-row"><label>狀態</label><select id="drst"><option value="1">已給藥</option><option value="0">未給（跳過）</option></select></div>
    <div class="form-row"><label>備註</label><input type="text" id="drnote" placeholder="貓咪反應、特殊狀況（選填）"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveDrugRecord()">儲存</button>
    </div>`;
  openModal();
}
function saveDrugRecord(){
  const date=document.getElementById('drd').value;
  if(!date)return;
  drugRecords.push({date,drugName:document.getElementById('drn').value,dose:document.getElementById('drdose').value.trim()||'—',giver:document.getElementById('drg').value,given:document.getElementById('drst').value==='1',note:document.getElementById('drnote').value.trim(),time:nowStr()});
  save();closeModal();renderDrugRecords();renderCalendar();
}
function renderDrugRecords(){
  syncDrugSelect();
  const df=document.getElementById('drug-fd').value;
  const fn=document.getElementById('drug-fn').value;
  let all=[...drugRecords].sort((a,b)=>b.date.localeCompare(a.date));
  if(df)all=all.filter(r=>r.date===df);
  if(fn)all=all.filter(r=>r.drugName===fn);
  const tb=document.getElementById('drug-body');
  if(!all.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty">尚無給藥紀錄</div></td></tr>`;return;}
  tb.innerHTML=all.map(r=>{
    const p=r.date.split('-');
    const gi=drugRecords.indexOf(r);
    return`<tr>
      <td>${parseInt(p[1])}/${parseInt(p[2])}</td>
      <td><span class="drug-badge">${r.drugName}</span></td>
      <td>${r.dose}</td>
      <td><span class="mdot" style="background:${mc(r.giver)};"></span> ${r.giver}</td>
      <td style="color:var(--muted);">${r.time}</td>
      <td><span class="status-badge ${r.given?'sb-given':'sb-miss'}">${r.given?'已給藥':'未給'}</span></td>
      <td><button class="btn-icon" onclick="drugRecords.splice(${gi},1);save();renderDrugRecords();renderCalendar()">🗑</button></td>
    </tr>`;
  }).join('');
}

// ════════════════════════════════
//  交接備註
// ════════════════════════════════
function openNoteModal(){
  document.getElementById('modal-title').textContent='新增備註';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-row"><label>類型</label><select id="ntt"><option value="handover">交接事項</option><option value="note">一般備註</option><option value="alert">注意事項</option></select></div>
    <div class="form-row"><label>留言人</label><select id="ntm">${members.map(m=>`<option>${m}</option>`).join('')}</select></div>
    <div class="form-row"><label>內容</label><textarea id="ntc" placeholder="請輸入內容…"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNote()">儲存</button>
    </div>`;
  openModal();
}
function saveNote(){
  const content=document.getElementById('ntc').value.trim();
  if(!content)return;
  const n=new Date();
  notesData.unshift({type:document.getElementById('ntt').value,member:document.getElementById('ntm').value,content,time:`${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`});
  save();closeModal();renderNotes();
}
function renderNotes(){
  const tf=document.getElementById('note-ft').value;
  let all=notesData;
  if(tf)all=all.filter(n=>n.type===tf);
  const el=document.getElementById('notes-list');
  if(!all.length){el.innerHTML='<div class="empty">尚無備註</div>';return;}
  el.innerHTML=all.map(n=>`
    <div class="note-card">
      <div class="note-meta">
        <span class="note-type-badge ${TYPE_INFO[n.type].cls}">${TYPE_INFO[n.type].label}</span>
        <span class="mdot" style="background:${mc(n.member)};"></span>${n.member} · ${n.time}
        <button class="btn-icon" style="margin-left:auto;" onclick="delNote(${notesData.indexOf(n)})">🗑</button>
      </div>
      <div class="note-text">${n.content}</div>
    </div>`).join('');
}
function delNote(idx){notesData.splice(idx,1);save();renderNotes();}

// ════════════════════════════════
//  人員
// ════════════════════════════════
function renderMembers(){
  document.getElementById('members-row').innerHTML=members.map(m=>`
    <div class="member-tag">
      <span class="mdot" style="background:${mc(m)};"></span>${m}
      <button class="btn-icon" onclick="removeMember('${m}')">✕</button>
    </div>`).join('');
}
function addMember(){
  const inp=document.getElementById('new-member');
  const name=inp.value.trim();
  if(!name||members.includes(name))return;
  members.push(name);inp.value='';save();renderMembers();renderMemberStats();
}
function removeMember(name){
  if(!confirm(`確定要移除 ${name}？`))return;
  members=members.filter(m=>m!==name);save();renderMembers();renderMemberStats();
}
function renderMemberStats(){
  const tb=document.getElementById('member-stats');
  if(!members.length){tb.innerHTML='<tr><td colspan="8"><div class="empty">尚無人員</div></td></tr>';return;}
  tb.innerHTML=members.map(m=>{
    const all=getAllScheds().filter(s=>s.member===m);
    const earlyN=all.filter(s=>s.shift==='early').length;
    const noonN =all.filter(s=>s.shift==='noon').length;
    const lateN =all.filter(s=>s.shift==='late').length;
    const totalHrs=earlyN*SHIFT_HOURS.early + noonN*SHIFT_HOURS.noon + lateN*SHIFT_HOURS.late;
    const myLogs=Object.values(logs).flat().filter(l=>l.member===m).length;
    return`<tr>
      <td><span class="mdot" style="background:${mc(m)};"></span> ${m}</td>
      <td>${all.length}</td>
      <td>${earlyN}</td>
      <td>${noonN}</td>
      <td>${lateN}</td>
      <td style="font-weight:500;">${totalHrs} h</td>
      <td style="color:var(--green);">${all.filter(s=>s.signed).length}</td>
      <td>${myLogs}</td>
    </tr>`;
  }).join('');
}
function syncMemberSelect(id){
  const sel=document.getElementById(id);
  if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">全部人員</option>'+members.map(m=>`<option value="${m}">${m}</option>`).join('');
  sel.value=cur;
}

// ════════════════════════════════
//  Modal
// ════════════════════════════════
function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');renderCalendar();}
function closeModalIfBg(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ════════════════════════════════
//  啟動
// ════════════════════════════════
loadFromSheet();
</script>
